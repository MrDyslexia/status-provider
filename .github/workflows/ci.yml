name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bun-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Bun 1.3.4
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Pack
        run: |
          bun pm pack
          mkdir -p package-artifacts
          mv ./*.tgz package-artifacts/

      - name: Upload package tarball
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: package-artifacts/*.tgz
          if-no-files-found: error

  runtime-smoke:
    runs-on: ubuntu-latest
    needs: bun-quality

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download package tarball
        uses: actions/download-artifact@v4
        with:
          name: package-tarball
          path: package-artifacts

      - name: Smoke test published package on Node ${{ matrix.node-version }}
        run: |
          TARBALL="$(find "$GITHUB_WORKSPACE/package-artifacts" -name '*.tgz' -print -quit)"
          if [ -z "$TARBALL" ]; then
            echo "Package tarball artifact not found" >&2
            exit 1
          fi

          WORKDIR="$(mktemp -d)"
          cd "$WORKDIR"
          npm init -y
          npm install --omit=dev "$TARBALL"
          node --input-type=module <<'EOF'
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";

          await import("status-provider");
          await import("status-provider/server");

          const pkg = JSON.parse(await readFile("node_modules/status-provider/package.json", "utf8"));
          assert.equal(pkg.engines?.node, ">=18.0.0");
          EOF
